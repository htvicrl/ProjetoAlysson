<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Tela de Início</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .welcome-card {
            background: #fff;
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.15);
            text-align: center;
            max-width: 400px;
        }

        h2 {
            color: #333;
            margin-bottom: 15px;
        }

        p {
            color: #555;
            font-size: 16px;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            background: #28a745;
            padding: 12px 20px;
            color: #fff;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            background: #1e7e34;
        }
    </style>
</head>

<body>

    <div class="welcome-card">
        <h2>Login realizado com sucesso!</h2>
        <p>Bem-vindo(a) ao sistema 👋</p>

        <a href="/tarefas">Ir para suas tarefas</a>
    </div>

</body>
</html>
